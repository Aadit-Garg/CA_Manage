<svg xmlns="http://www.w3.org/2000/svg" width="152" height="152" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706" />
      <stop offset="50%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#fbbf24" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#60a5fa" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Logo Graphics Group -->
  <g filter="url(#shadow)">
    <!-- Shield/Document outline -->
    <path d="M256 70 L390 130 V260 C390 350 256 430 256 430 C256 430 122 350 122 260 V130 Z" 
          fill="none" stroke="url(#accent)" stroke-width="12" stroke-linejoin="round" opacity="0.4" />
    
    <!-- Stylized "C" Ribbon -->
    <path d="M200 170 C160 170 140 190 140 256 C140 322 160 342 200 342 C230 342 245 328 250 310" 
          fill="none" stroke="url(#gold)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Stylized "A" Ribbon -->
    <path d="M280 342 L320 170 L360 342" 
          fill="none" stroke="url(#gold)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M295 285 H345" 
          fill="none" stroke="url(#gold)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>