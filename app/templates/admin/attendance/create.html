{% extends "base.html" %}
{% block title %}Add Attendance Record — CA Manage{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="fw-bold mb-0">Add Attendance Record</h3>
        <p class="text-muted small mb-0">Manually create an attendance record for an employee</p>
    </div>
    <a href="{{ url_for('admin.attendance_dashboard') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</div>

<div class="ca-card">
    <div class="ca-card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-medium">Employee</label>
                    <select name="employee_id" class="form-select" required>
                        <option value="">Select an employee...</option>
                        {% for emp in employees %}
                        <option value="{{ emp.user_id }}">{{ emp.user.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Punch In Time</label>
                    <input type="datetime-local" name="punch_in_time" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Punch Out Time</label>
                    <input type="datetime-local" name="punch_out_time" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Status</label>
                    <select name="status" class="form-select">
                        {% for s in ['Present', 'Half Day', 'Absent', 'Leave', 'Holiday'] %}
                        <option value="{{ s }}">{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium">Notes</label>
                    <input type="text" name="notes" class="form-control" placeholder="Optional notes...">
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>Create Record
                </button>
                <a href="{{ url_for('admin.attendance_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
