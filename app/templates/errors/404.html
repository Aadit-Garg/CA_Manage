{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block auth_content %}
<div class="ca-login-wrapper">
    <div class="text-center">
        <h1 class="display-1 fw-bold text-primary mb-0">404</h1>
        <h3 class="fw-bold mt-3 mb-2">Page Not Found</h3>
        <p class="text-muted mb-4">The resource you are looking for has been moved or deleted.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary fw-semibold px-4 py-2">
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
