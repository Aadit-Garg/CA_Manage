{% extends "base.html" %}
{% block title %}400 — Bad Request{% endblock %}
{% block body_class %}ca-auth-page{% endblock %}

{% block auth_content %}
<div class="ca-error-container">
    <div class="text-center ca-card p-5" style="max-width: 500px; border-top: 4px solid var(--ca-primary);">
        <div class="ca-error-code">400</div>
        <h2 class="fw-bold mb-3 text-dark">Bad Request</h2>
        <p class="text-muted mb-4">The server couldn't understand your request. Please check the URL and try again.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary w-100 pt-2 pb-2">
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
